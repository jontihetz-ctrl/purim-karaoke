<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎭 Purim Karaoke — Table Cards (Print)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  /* ── Screen setup UI ── */
  .screen-only {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a0a2e;
    color: #fff;
    padding: 24px;
    min-height: 100vh;
  }
  .setup-panel {
    max-width: 560px;
    margin: 0 auto 24px;
    background: #231040;
    border: 2px solid #f5c518;
    border-radius: 16px;
    padding: 24px;
  }
  .setup-panel h2 { color: #f5c518; font-size: 1.2rem; margin-bottom: 16px; }
  .setup-panel label { display: block; font-size: 0.85rem; color: #a89ec9; margin-bottom: 6px; }
  .setup-panel input {
    width: 100%; background: #160830; border: 2px solid #3d1f7a;
    border-radius: 8px; color: #fff; font-size: 1rem;
    padding: 10px 14px; margin-bottom: 14px; outline: none;
  }
  .setup-panel input:focus { border-color: #f5c518; }
  .print-btn {
    background: linear-gradient(135deg, #f5c518, #e6a817);
    color: #1a0a2e; border: none; border-radius: 10px;
    padding: 12px 28px; font-size: 1rem; font-weight: 900;
    cursor: pointer; width: 100%;
  }
  .layout-note { font-size: 0.8rem; color: #a89ec9; margin-top: 10px; text-align: center; }

  .print-sheet.ready { display: block; max-width: 800px; margin: 0 auto; }

  @media print {
    .screen-only { display: none !important; }
    .print-sheet { display: block !important; }
    * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    @page { margin: 8mm; size: A4 portrait; }
  }

  /* ── Gemara page card ── */
  .table-card {
    width: 194mm;
    min-height: 277mm;
    margin: 0 auto;
    page-break-after: always;
    background: #fdf8ed;
    border: 4px double #8b6914;
    display: flex;
    flex-direction: column;
    font-family: 'Times New Roman', Times, serif;
    position: relative;
    overflow: hidden;
  }

  /* Outer decorative border lines */
  .table-card::before {
    content: '';
    position: absolute;
    inset: 6px;
    border: 1.5px solid #c9a84c;
    pointer-events: none;
    z-index: 0;
  }

  /* ── Header banner (purple/gold like ArtScroll cover) ── */
  .card-header {
    background: linear-gradient(135deg, #3b0d82 0%, #5b1fa8 50%, #7c3aed 100%);
    border-bottom: 3px solid #c9a84c;
    padding: 10px 16px 8px;
    text-align: center;
    position: relative;
    z-index: 1;
  }
  .card-header-title {
    font-family: 'Times New Roman', Times, serif;
    font-size: 1.05rem;
    font-weight: 900;
    color: #f5c518;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .card-header-sub {
    font-size: 0.72rem;
    color: rgba(255,255,255,0.8);
    margin-top: 2px;
    letter-spacing: 0.05em;
  }

  /* ── Masechet title ── */
  .masechet-title {
    text-align: center;
    padding: 10px 20px 4px;
    position: relative; z-index: 1;
    border-bottom: 1px solid #c9a84c;
  }
  .masechet-heb {
    font-size: 1.5rem;
    color: #3b0d82;
    font-weight: 700;
    direction: rtl;
    font-family: 'Times New Roman', Times, serif;
  }
  .masechet-eng {
    font-size: 0.7rem;
    color: #6b4a0a;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* ── Main text body ── */
  .card-body {
    display: flex;
    flex: 1;
    position: relative;
    z-index: 1;
  }

  /* Left column: Rashi commentary */
  .col-rashi {
    width: 48mm;
    border-right: 1px solid #c9a84c;
    padding: 10px 8px;
    font-size: 0.58rem;
    color: #3a2800;
    line-height: 1.55;
  }
  .col-rashi-title {
    font-size: 0.62rem;
    font-weight: 700;
    color: #5b1fa8;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 5px;
    border-bottom: 1px solid #c9a84c;
    padding-bottom: 3px;
  }
  .rashi-heb {
    direction: rtl;
    font-style: italic;
    font-size: 0.6rem;
    color: #3a2800;
    margin-bottom: 3px;
    line-height: 1.6;
  }
  .rashi-eng {
    font-size: 0.58rem;
    color: #4a3010;
    line-height: 1.55;
    margin-bottom: 6px;
  }

  /* Centre column: Gemara text */
  .col-main {
    flex: 1;
    padding: 10px 12px;
  }

  .section-label {
    font-size: 0.62rem;
    font-weight: 700;
    color: #5b1fa8;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin: 6px 0 3px;
    border-bottom: 1px dotted #c9a84c;
    padding-bottom: 2px;
  }

  .heb-text {
    direction: rtl;
    font-size: 0.82rem;
    line-height: 1.8;
    color: #1a0a00;
    margin-bottom: 4px;
    text-align: right;
  }
  .heb-text .parasha { font-weight: 700; color: #3b0d82; }

  .eng-text {
    font-size: 0.65rem;
    line-height: 1.65;
    color: #2a1800;
    margin-bottom: 8px;
    text-align: justify;
  }
  .eng-text .label { font-weight: 700; font-style: italic; color: #5b1fa8; }
  .eng-text .bracket { color: #6b4a0a; font-style: italic; }

  /* ── QR footer ── */
  .card-footer {
    border-top: 2px solid #c9a84c;
    background: linear-gradient(135deg, #3b0d82 0%, #5b1fa8 50%, #7c3aed 100%);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: relative; z-index: 1;
  }
  .qr-box {
    background: #fff;
    border: 3px solid #f5c518;
    border-radius: 8px;
    padding: 4px;
    flex-shrink: 0;
  }
  .qr-box img { display: block; width: 80px; height: 80px; border-radius: 4px; }
  .footer-text { flex: 1; color: #fff; }
  .footer-cta {
    font-size: 1rem;
    font-weight: 900;
    color: #f5c518;
    line-height: 1.2;
  }
  .footer-sub { font-size: 0.65rem; color: rgba(255,255,255,0.75); margin-top: 3px; }
  .footer-url { font-size: 0.6rem; color: rgba(255,255,255,0.45); margin-top: 4px; font-family: 'Courier New', monospace; }
  .footer-emoji { font-size: 1.8rem; letter-spacing: 4px; }
</style>
</head>
<body>

<!-- ── Screen setup ── -->
<div class="screen-only">
  <div class="setup-panel">
    <h2>🖨️ Purim Torah Table Card Generator</h2>
    <label>Karaoke URL (guests scan this)</label>
    <input type="text" id="urlInput" placeholder="e.g. http://192.168.1.50:3000" value="http://172.31.108.148:3000" oninput="updateCards()">
    <label>Number of cards</label>
    <input type="number" id="countInput" min="1" max="30" value="4" oninput="updateCards()">
    <button class="print-btn" onclick="window.print()">🖨️ Print Now</button>
    <div class="layout-note">1 full A4 page per table · one per table</div>
  </div>
  <div class="print-sheet ready" id="printSheet"></div>
</div>

<div class="print-sheet" id="printSheetActual"></div>

<script>
function makeCard(url) {
  const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=400x400&margin=2&data=${encodeURIComponent(url)}`;
  return `
  <div class="table-card">

    <div class="card-header">
      <div class="card-header-title">👑 Aish HaTorah Johannesburg &nbsp;·&nbsp; Purim 5786 🎭</div>
      <div class="card-header-sub">מסכת קראוקה · Tractate Karaoke · Daf Aleph</div>
    </div>

    <div class="masechet-title">
      <div class="masechet-heb">מַסֶּכֶת קָרָאוֹקֶה — דַּף א</div>
      <div class="masechet-eng">Tractate Karaoke — Folio 1a</div>
    </div>

    <div class="card-body">

      <!-- Rashi column -->
      <div class="col-rashi">
        <div class="col-rashi-title">רש"י · Rashi</div>

        <div class="rashi-heb">קָרָאוֹקֶה —</div>
        <div class="rashi-eng"><em>Karaoke</em> — A form of song without musical accompaniment, originating in the Far East, which has spread throughout the world and reached its ultimate fulfillment at Aish HaTorah Johannesburg.</div>

        <div class="rashi-heb">בְּקוֹל שֶׁאֵינוֹ נָעִים —</div>
        <div class="rashi-eng"><em>With a voice that is not pleasant</em> — Nevertheless valid, and one does not interrupt him, even if those present cover their ears.</div>

        <div class="rashi-heb">בֵּין "דּוֹן סְטוֹפּ בִּילִיבִין" לְ"הָבָה נָגִילָה" —</div>
        <div class="rashi-eng"><em>Between "Don't Stop Believin'" and "Hava Nagila"</em> — The Sages established these as the two poles of the Purim karaoke experience, between which all joy is contained.</div>

        <div class="rashi-heb">וְכָל הַמַּאֲרִיךְ —</div>
        <div class="rashi-eng"><em>And one who prolongs</em> — Even if he sings a song a second and third time, he is praiseworthy, provided the crowd has not yet fled.</div>
      </div>

      <!-- Main Gemara text -->
      <div class="col-main">

        <div class="section-label">משנה · Mishnah</div>
        <div class="heb-text">
          כָּל הַשָּׁר בְּפוּרִים — יָצָא. כָּל הַשָּׁר בְּקוֹל נָעִים — יָצָא וְקִיֵּם מִצְוָה מִן הַמֻּבְחָר.
          כָּל הַשָּׁר בְּקוֹל שֶׁאֵינוֹ נָעִים — יָצָא, וּצְרִיכִין חֲבֵרָיו לִסְבֹּל אוֹתוֹ בְּסֵבֶר פָּנִים יָפוֹת.
        </div>
        <div class="eng-text">
          <span class="label">MISHNAH:</span> One who sings on Purim — has fulfilled his obligation. One who sings with a pleasant voice — has fulfilled his obligation and performed the mitzvah in the most exemplary manner. One who sings with a voice that is not pleasant — has nonetheless fulfilled his obligation, and his companions are required to bear with him graciously.
        </div>

        <div class="section-label">גמרא · Gemara</div>
        <div class="heb-text">
          <span class="parasha">תָּנוּ רַבָּנַן:</span> אַרְבָּעָה דְבָרִים נֶאֶמְרוּ בְּפוּרִים —
          מִשְׁתֶּה וְשִׂמְחָה, מִשְׁלוֹחַ מָנוֹת, מַתָּנוֹת לָאֶבְיוֹנִים,
          וְקָרָאוֹקֶה בְּבֵית Aish HaTorah יוֹהַנֶּסְבּוּרְג.
        </div>
        <div class="eng-text">
          <span class="label">The Rabbis taught in a <em>baraisa</em>:</span> Four things were said regarding Purim — feasting and rejoicing, sending of portions [<span class="bracket">mishloach manos</span>], gifts to the poor, and karaoke at Aish HaTorah Johannesburg.
        </div>

        <div class="heb-text">
          אָמַר רַב יְהוּדָה אָמַר רַב: מְנָא הָנֵי מִילֵּי?
          אָמַר קְרָא: <span class="parasha">"וְיוֹם טוֹב"</span> — זֶה קָרָאוֹקֶה,
          שֶׁכָּל הָעוֹשֶׂה יוֹם טוֹב לַחֲבֵרוֹ בְּשִׁירָתוֹ,
          אֲפִילּוּ בְּקוֹל שֶׁאֵינוֹ נָעִים —
          כְּאִלּוּ בָּנָה בֵּית הַמִּקְדָּשׁ בִּימָיו.
        </div>
        <div class="eng-text">
          <span class="label">Rav Yehudah said in the name of Rav:</span> From where do we derive this? — Scripture states: <em>"and a good day"</em> [<span class="bracket">Esther 9:19</span>] — this refers to karaoke, for one who brings joy to his fellow through song — even with a voice that is not pleasant — it is as if he built the Holy Temple in his generation.
        </div>

        <div class="heb-text">
          אָמַר רַבָּה: חַיָּיב אִינִישׁ לְמִיבְּסַם בְּפוּרִים עַד דְּלָא יָדַע
          בֵּין <span class="parasha">"דּוֹן סְטוֹפּ בִּילִיבִין"</span> לְ<span class="parasha">"הָבָה נָגִילָה"</span>.
          מַתְקֵיף לַהּ רַב פָּפָּא: וְכִי אֶפְשָׁר?
          אָמַר לֵיהּ: אֵין, שְׁנֵיהֶם עוֹלִין יָפֶה בְּפוּרִים.
        </div>
        <div class="eng-text">
          <span class="label">Rabbah said:</span> A person is obligated to become sufficiently joyful on Purim until he cannot distinguish between <em>"Don't Stop Believin'"</em> and <em>"Hava Nagila."</em> <span class="label">Rav Pappa challenged this:</span> Is that even possible? <span class="label">He replied:</span> Indeed — on Purim, both go equally well.
        </div>

      </div>
    </div>

    <!-- QR footer -->
    <div class="card-footer">
      <div class="qr-box">
        <img src="${qrUrl}" alt="QR Code">
      </div>
      <div class="footer-text">
        <div class="footer-cta">🎤 Scan to pick your song!</div>
        <div class="footer-sub">Browse the catalogue &amp; add yourself to the queue</div>
        <div class="footer-url">${url}</div>
      </div>
      <div class="footer-emoji">🎭🎉✡️</div>
    </div>

  </div>`;
}

function updateCards() {
  const url = document.getElementById('urlInput').value.trim() || 'http://192.168.x.x:3000';
  const count = Math.max(1, Math.min(30, parseInt(document.getElementById('countInput').value) || 4));
  let pages = '';
  for (let i = 0; i < count; i++) pages += makeCard(url);
  document.getElementById('printSheet').innerHTML = pages;
  document.getElementById('printSheetActual').innerHTML = pages;
}

updateCards();
</script>
</body>
</html>
