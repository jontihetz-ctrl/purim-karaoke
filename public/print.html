<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎭 Purim Karaoke — Table Cards (Print)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  /* --- Screen UI (hidden when printing) --- */
  .screen-only {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a0a2e;
    color: #fff;
    padding: 24px;
    min-height: 100vh;
  }
  .setup-panel {
    max-width: 560px;
    margin: 0 auto;
    background: #231040;
    border: 2px solid #f5c518;
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 24px;
  }
  .setup-panel h2 { color: #f5c518; font-size: 1.2rem; margin-bottom: 16px; }
  .setup-panel label { display: block; font-size: 0.85rem; color: #a89ec9; margin-bottom: 6px; }
  .setup-panel input {
    width: 100%;
    background: #160830;
    border: 2px solid #3d1f7a;
    border-radius: 8px;
    color: #fff;
    font-size: 1rem;
    padding: 10px 14px;
    margin-bottom: 14px;
    outline: none;
  }
  .setup-panel input:focus { border-color: #f5c518; }
  .print-btn {
    background: linear-gradient(135deg, #f5c518, #e6a817);
    color: #1a0a2e;
    border: none;
    border-radius: 10px;
    padding: 12px 28px;
    font-size: 1rem;
    font-weight: 900;
    cursor: pointer;
    width: 100%;
  }
  .layout-note {
    font-size: 0.8rem;
    color: #a89ec9;
    margin-top: 10px;
    text-align: center;
  }

  /* --- Print sheet --- */
  .print-sheet {
    display: none; /* shown via JS after setup */
  }

  @media screen {
    .print-sheet.ready {
      display: block;
      max-width: 800px;
      margin: 0 auto;
    }
  }

  @media print {
    .screen-only { display: none !important; }
    .print-sheet { display: block !important; }
    * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    @page { margin: 10mm; size: A4; }
  }

  /* 2×2 grid of cards per page */
  .card-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 8mm;
    width: 100%;
    height: 277mm; /* A4 height minus margins */
    page-break-after: always;
  }

  /* Individual table card */
  .table-card {
    background: #1a0a2e;
    border: 3px solid #f5c518;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 12px 10px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  /* Decorative dots background */
  .table-card::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      radial-gradient(circle, #f5c51818 1px, transparent 1px),
      radial-gradient(circle, #7c3aed18 1px, transparent 1px);
    background-size: 18px 18px, 30px 30px;
    background-position: 0 0, 9px 9px;
    pointer-events: none;
  }

  /* Purple top banner */
  .card-banner {
    background: linear-gradient(135deg, #5b1fa8, #7c3aed, #a855f7);
    width: calc(100% + 20px);
    margin: -12px -10px 10px;
    padding: 8px 10px;
    border-bottom: 2px solid #f5c518;
    position: relative;
  }
  .card-banner-title {
    font-family: Georgia, serif;
    font-size: 0.95rem;
    font-weight: 900;
    color: #f5c518;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .card-banner-sub {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 0.6rem;
    color: rgba(255,255,255,0.8);
    margin-top: 1px;
  }

  /* QR code */
  .card-qr {
    width: 140px;
    height: 140px;
    border: 4px solid #f5c518;
    border-radius: 10px;
    background: #fff;
    padding: 4px;
    margin: 6px 0;
    position: relative;
  }
  .card-qr img { width: 100%; height: 100%; display: block; border-radius: 4px; }

  /* CTA text */
  .card-cta {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 1rem;
    font-weight: 900;
    color: #f5c518;
    margin: 4px 0 2px;
    position: relative;
  }
  .card-sub {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 0.62rem;
    color: #c4a0ff;
    position: relative;
    line-height: 1.4;
  }

  /* URL display */
  .card-url {
    font-family: 'Courier New', monospace;
    font-size: 0.55rem;
    color: #6b5a8a;
    margin-top: 6px;
    word-break: break-all;
    position: relative;
    padding: 0 4px;
  }

  /* Bottom decorations */
  .card-footer {
    font-size: 1rem;
    margin-top: 4px;
    position: relative;
    letter-spacing: 3px;
  }

  /* Purim emoji corners */
  .corner {
    position: absolute;
    font-size: 1.1rem;
    opacity: 0.5;
  }
  .corner-tl { top: 36px; left: 8px; }
  .corner-tr { top: 36px; right: 8px; }
  .corner-bl { bottom: 6px; left: 8px; }
  .corner-br { bottom: 6px; right: 8px; }
</style>
</head>
<body>

<!-- ===== SCREEN SETUP UI ===== -->
<div class="screen-only">
  <div class="setup-panel">
    <h2>🖨️ Table Card Generator</h2>
    <label>Karaoke URL (guests will scan this)</label>
    <input type="text" id="urlInput" placeholder="e.g. http://192.168.1.50:3000" value="http://172.31.108.148:3000" oninput="updateCards()">
    <label>Number of cards to print</label>
    <input type="number" id="countInput" min="1" max="40" value="8" oninput="updateCards()">
    <button class="print-btn" onclick="window.print()">🖨️ Print Now</button>
    <div class="layout-note">2 cards per row · 4 per A4 page · cut along the borders</div>
  </div>

  <div class="print-sheet ready" id="printSheet"></div>
</div>

<!-- ===== PRINT SHEET (only visible when printing) ===== -->
<div class="print-sheet" id="printSheetActual"></div>

<script>
function makeCard(url) {
  const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&margin=2&data=${encodeURIComponent(url)}`;
  return `
    <div class="table-card">
      <div class="card-banner">
        <div class="card-banner-title">👑 Aish Hatorah JHB 👑</div>
        <div class="card-banner-sub">🎭 Purim Karaoke 2026 🎭</div>
      </div>
      <span class="corner corner-tl">🎭</span>
      <span class="corner corner-tr">🎉</span>
      <div class="card-cta">🎤 Sing Tonight!</div>
      <div class="card-sub">Scan to browse the catalogue<br>& add your song to the queue</div>
      <div class="card-qr">
        <img src="${qrUrl}" alt="QR Code">
      </div>
      <div class="card-sub" style="font-size:0.7rem;color:#f5c518;font-weight:700">📱 Scan with your phone camera</div>
      <div class="card-url">${url}</div>
      <div class="card-footer">🎵 🥳 🎊</div>
      <span class="corner corner-bl">✡️</span>
      <span class="corner corner-br">✡️</span>
    </div>`;
}

function updateCards() {
  const url = document.getElementById('urlInput').value.trim() || 'http://192.168.1.x:3000';
  const count = Math.max(1, Math.min(40, parseInt(document.getElementById('countInput').value) || 8));

  // Build pages (4 cards per page)
  let pages = '';
  for (let i = 0; i < count; i += 4) {
    const cardsInPage = Math.min(4, count - i);
    let cards = '';
    for (let j = 0; j < cardsInPage; j++) cards += makeCard(url);
    // Pad to 4 if last page has fewer
    for (let j = cardsInPage; j < 4; j++) cards += '<div class="table-card" style="border-style:dashed;opacity:0.2"></div>';
    pages += `<div class="card-grid">${cards}</div>`;
  }

  document.getElementById('printSheet').innerHTML = pages;
  document.getElementById('printSheetActual').innerHTML = pages;
}

updateCards();
</script>
</body>
</html>
